<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Технические работы</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at 20% 30%, #0a0f1a, #020408);
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            color: #f0f3f8;
            padding: 20px;
        }

        .maintenance-wrapper {
            max-width: 550px;
            width: 100%;
            text-align: center;
            animation: fadeIn 0.8s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Иконка */
        .icon-container {
            font-size: 80px;
            margin-bottom: 20px;
            animation: gearSpin 4s linear infinite;
            display: inline-block;
        }

        @keyframes gearSpin {
            0% { transform: rotate(0deg) scale(1); }
            50% { transform: rotate(180deg) scale(1.1); }
            100% { transform: rotate(360deg) scale(1); }
        }

        /* Заголовок */
        .main-title {
            font-size: 32px;
            font-weight: 800;
            background: linear-gradient(135deg, #ffcc66, #ffaa33);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 12px;
        }

        /* Подзаголовок */
        .sub-title {
            font-size: 18px;
            color: #88aacc;
            margin-bottom: 8px;
        }

        /* Описание */
        .description {
            font-size: 14px;
            opacity: 0.7;
            line-height: 1.6;
            margin-bottom: 24px;
            padding: 0 10px;
        }

        /* Прогресс-бар */
        .progress-container {
            background: rgba(255, 255, 255, 0.08);
            border-radius: 60px;
            height: 8px;
            overflow: hidden;
            margin-bottom: 30px;
            box-shadow: inset 0 1px 3px rgba(0, 0, 0, 0.3);
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #ffaa33, #ffcc66, #ffaa33);
            background-size: 200% 100%;
            border-radius: 60px;
            animation: progressShimmer 2s ease-in-out infinite, progressLoad 8s ease-in-out forwards;
        }

        @keyframes progressShimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        @keyframes progressLoad {
            0% { width: 0%; }
            20% { width: 15%; }
            40% { width: 35%; }
            60% { width: 55%; }
            80% { width: 75%; }
            95% { width: 92%; }
            100% { width: 95%; }
        }

        /* Статус */
        .status-text {
            font-size: 13px;
            color: #88ddbb;
            margin-bottom: 24px;
            animation: statusPulse 2s ease-in-out infinite;
        }

        @keyframes statusPulse {
            0%, 100% { opacity: 0.7; }
            50% { opacity: 1; }
        }

        .status-dot {
            display: inline-block;
            width: 10px;
            height: 10px;
            background: #44ff44;
            border-radius: 50%;
            margin-right: 8px;
            animation: dotPulse 1.5s ease-in-out infinite;
        }

        @keyframes dotPulse {
            0%, 100% { opacity: 0.3; transform: scale(0.8); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        /* Кнопки */
        .buttons {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 8px;
        }

        .btn {
            padding: 14px 32px;
            border-radius: 60px;
            font-weight: 700;
            font-size: 16px;
            border: none;
            cursor: pointer;
            transition: 0.2s;
            text-decoration: none;
            display: inline-block;
        }

        .btn-primary {
            background: linear-gradient(135deg, #ffcc66, #ffaa33);
            color: #1a1a2e;
            box-shadow: 0 4px 20px rgba(255, 170, 51, 0.3);
        }

        .btn-primary:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 30px rgba(255, 170, 51, 0.5);
        }

        .btn-secondary {
            background: linear-gradient(135deg, #3a6b58, #1e3e31);
            color: white;
        }

        .btn-secondary:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 20px rgba(58, 107, 88, 0.4);
        }

        .btn:active {
            transform: scale(0.95);
        }

        /* Ссылки в футере */
        .footer {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }

        .footer a {
            color: #ffcc66;
            text-decoration: none;
            font-size: 13px;
            margin: 0 10px;
            transition: 0.2s;
        }

        .footer a:hover {
            color: #ffaa33;
            text-decoration: underline;
        }

        .footer-text {
            font-size: 12px;
            opacity: 0.4;
            margin-top: 8px;
        }

        /* Мобильная адаптация */
        @media (max-width: 480px) {
            .main-title {
                font-size: 26px;
            }
            .icon-container {
                font-size: 60px;
            }
            .sub-title {
                font-size: 16px;
            }
            .btn {
                padding: 12px 24px;
                font-size: 14px;
                width: 100%;
                max-width: 280px;
            }
        }
    </style>
</head>
<body>
    <div class="maintenance-wrapper">
        <!-- Иконка -->
        <div class="icon-container">🔧</div>

        <!-- Заголовок -->
        <h1 class="main-title">ТЕХНИЧЕСКИЕ РАБОТЫ</h1>
        <p class="sub-title">Мы скоро вернёмся!</p>

        <!-- Описание -->
        <p class="description">
            🔄 Игра временно недоступна.<br>
            Мы обновляем серверы и добавляем новые функции.<br>
            Приносим извинения за неудобства!
        </p>

        <!-- Прогресс-бар -->
        <div class="progress-container">
            <div class="progress-bar"></div>
        </div>

        <!-- Статус -->
        <div class="status-text">
            <span class="status-dot"></span>
            <span id="statusMessage">Обновление в процессе...</span>
        </div>

        <!-- Кнопки -->
        <div class="buttons">
            <button class="btn btn-primary" onclick="checkStatus()">🔄 ПРОВЕРИТЬ СТАТУС</button>
            <a href="https://t.me/minebuff" target="_blank" class="btn btn-secondary">📢 НАШ TELEGRAM</a>
        </div>

        <!-- Футер -->
        <div class="footer">
            <a href="https://t.me/b_loody" target="_blank">Поддержка</a>
            <a href="https://yoomoney.ru/to/4100119003253255" target="_blank">❤️ Поддержать</a>
            <p class="footer-text">⏳ Ориентировочное время: 15-30 минут</p>
        </div>
    </div>

    <script>
        // ===== СТАТУСЫ =====
        const statusMessages = [
            '🔄 Подготовка серверов...',
            '📦 Обновление базы данных...',
            '⚡ Настройка производительности...',
            '🔧 Установка новых функций...',
            '✅ Финальная проверка...',
            '🚀 Скоро запуск!',
        ];

        let currentStatusIndex = 0;

        // Меняем статус каждые 3 секунды
        setInterval(() => {
            currentStatusIndex = (currentStatusIndex + 1) % statusMessages.length;
            const statusSpan = document.getElementById('statusMessage');
            if (statusSpan) {
                statusSpan.textContent = statusMessages[currentStatusIndex];
            }
        }, 3000);

        // ===== КНОПКА "ПРОВЕРИТЬ СТАТУС" =====
        function checkStatus() {
            const btn = document.querySelector('.btn-primary');
            const originalText = btn.textContent;

            btn.textContent = '⏳ ПРОВЕРКА...';
            btn.style.opacity = '0.7';
            btn.style.pointerEvents = 'none';

            // Имитация проверки
            setTimeout(() => {
                const statusSpan = document.getElementById('statusMessage');
                const randomStatus = statusMessages[Math.floor(Math.random() * statusMessages.length)];
                statusSpan.textContent = randomStatus;

                btn.textContent = '✅ ГОТОВО!';
                btn.style.background = 'linear-gradient(135deg, #44ff44, #22aa22)';
                btn.style.color = '#1a1a2e';

                setTimeout(() => {
                    btn.textContent = '🔄 ПРОВЕРИТЬ СТАТУС';
                    btn.style.background = '';
                    btn.style.color = '';
                    btn.style.opacity = '1';
                    btn.style.pointerEvents = 'auto';
                }, 2000);
            }, 1500);
        }

        // ===== КЛАВИША F5 =====
        document.addEventListener('keydown', (e) => {
            if (e.key === 'F5' || (e.ctrlKey && e.key === 'r')) {
                e.preventDefault();
                checkStatus();
            }
        });

        console.log('🛠️ Технические работы. Мы скоро вернёмся!');
    </script>
</body>
</html>
